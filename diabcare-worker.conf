[program:diabcare-worker]
process_name=%(program_name)s_%(process_num)02d
command=php c:/laragon/www/DiabCare/artisan queue:work --verbose --tries=3 --timeout=60
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=c:/laragon/www/DiabCare/storage/logs/worker.log
stopwaitsecs=3600